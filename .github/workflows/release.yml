name: Release

# Build and publish packages only when a release is published. The release
# (and its notes) is created first; this workflow then attaches the built
# artifacts, SBOM, checksums and provenance attestations to it.
on:
  release:
    types: [published]

permissions:
  contents: write       # upload assets to the release
  id-token: write       # OIDC token for signing attestations
  attestations: write   # write build-provenance and SBOM attestations

jobs:
  package-deb:
    name: Package .deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_DIR="lua-resty-acme_${VERSION}_all"
          LUA_LIB="${PKG_DIR}/usr/local/openresty/site/lualib"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${LUA_LIB}"
          mkdir -p "${PKG_DIR}/usr/share/doc/lua-resty-acme"

          cp -r lib/resty "${LUA_LIB}/"
          cp LICENSE "${PKG_DIR}/usr/share/doc/lua-resty-acme/copyright"

          cat > "${PKG_DIR}/DEBIAN/control" <<EOF
          Package: lua-resty-acme
          Version: ${VERSION}
          Section: libs
          Priority: optional
          Architecture: all
          Depends: openresty
          Maintainer: Ashley Kleynhans
          Homepage: https://github.com/ashleykleynhans/lua-resty-acme
          Description: Automatic Let's Encrypt certificate serving for OpenResty
           Automatic Let's Encrypt certificate serving (RSA + ECC) and pure Lua
           implementation of the ACMEv2 protocol. Supports http-01, tls-alpn-01,
           and dns-01 challenges with multiple storage backends.
          EOF

          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"
          dpkg-deb --build --root-owner-group "${PKG_DIR}"

          DEB_FILE="${PKG_DIR}.deb"
          echo "DEB_FILE=${DEB_FILE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lua-resty-acme-deb
          path: ${{ env.DEB_FILE }}

  package-rpm:
    name: Package .rpm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build .rpm package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          WORKSPACE=$(pwd)

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          tar czf rpmbuild/SOURCES/lua-resty-acme-${VERSION}.tar.gz lib/ LICENSE

          cat > rpmbuild/SPECS/lua-resty-acme.spec <<'SPECEOF'
          Name:    lua-resty-acme
          Version: %{_version}
          Release: 1
          Summary: Automatic Let's Encrypt certificate serving for OpenResty
          License: BSD-3-Clause
          URL:     https://github.com/ashleykleynhans/lua-resty-acme
          Source0: lua-resty-acme-%{_version}.tar.gz
          BuildArch: noarch
          Requires: openresty

          %description
          Automatic Let's Encrypt certificate serving (RSA + ECC) and pure Lua
          implementation of the ACMEv2 protocol. Supports http-01, tls-alpn-01,
          and dns-01 challenges with multiple storage backends.

          %prep
          %setup -c -T
          tar xzf %{SOURCE0}

          %install
          mkdir -p %{buildroot}/usr/local/openresty/site/lualib
          cp -r lib/resty %{buildroot}/usr/local/openresty/site/lualib/
          mkdir -p %{buildroot}/usr/share/doc/lua-resty-acme
          cp LICENSE %{buildroot}/usr/share/doc/lua-resty-acme/

          %files
          /usr/local/openresty/site/lualib/resty/acme/
          /usr/share/doc/lua-resty-acme/LICENSE
          SPECEOF

          sed -i 's/^          //' rpmbuild/SPECS/lua-resty-acme.spec

          rpmbuild --define "_topdir ${WORKSPACE}/rpmbuild" \
            --define "_version ${VERSION}" \
            -bb rpmbuild/SPECS/lua-resty-acme.spec

          RPM_FILE=$(find rpmbuild/RPMS -name "*.rpm" | head -1)
          cp "${RPM_FILE}" .
          RPM_NAME=$(basename "${RPM_FILE}")
          echo "RPM_FILE=${RPM_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lua-resty-acme-rpm
          path: ${{ env.RPM_FILE }}

  release:
    name: Publish assets, SBOM and provenance
    runs-on: ubuntu-latest
    needs: [package-deb, package-rpm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Create source tarball
        run: |
          tar czf "lua-resty-acme-${VERSION}.tar.gz" \
            --transform "s,^,lua-resty-acme-${VERSION}/," \
            lib/ LICENSE README.md dist.ini

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release
          cp lua-resty-acme-*.tar.gz release/
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release/lua-resty-acme-${{ env.VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/*.deb
            release/*.rpm
            release/lua-resty-acme-*.tar.gz

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: |
            release/*.deb
            release/*.rpm
            release/lua-resty-acme-*.tar.gz
          sbom-path: release/lua-resty-acme-${{ env.VERSION }}.spdx.json

      - name: Upload assets to the published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release/* --clobber
